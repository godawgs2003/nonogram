<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Logic - 15x15 Nonogram</title>
    <link rel="stylesheet" href="styles.css?v=4">
</head>
<body>

    <!-- Intro Title Screen Overlay -->
    <div id="introScreen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #f5f7fa; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; font-family: sans-serif;">
        <h1 style="font-size: 36px; color: #2c3e50; margin-bottom: 10px;">Nonogram</h1>
        <p style="font-size: 16px; color: #7f8c8d; margin-bottom: 25px;">Logic Grid Puzzle Edition</p>
        <button id="startBtn" style="padding: 12px 30px; font-size: 16px; font-weight: bold; background-color: #2c3e50; color: white; border: none; border-radius: 6px; cursor: pointer;">Play Game</button>
    </div>

    <div class="game-container">
        <header>
            <h1>Nonogram Puzzle</h1>
            <div id="gameMeta">Difficulty: <span id="difficultyTag">Normal</span></div>
        </header>

        <div class="nonogram-wrapper">
            <!-- Top spacer for the top-left corner intersection -->
            <div class="corner-spacer"></div>

            <!-- Container where column headers (top clues) will be generated -->
            <div id="colHeaders" class="col-headers"></div>

            <!-- Container where row headers (left clues) will be generated -->
            <div id="rowHeaders" class="row-headers"></div>

            <!-- Main 15x15 Interactive Board Grid -->
            <div id="board" class="board-grid"></div>
        </div>

        <!-- Controls matching the tool setup from image.png -->
        <div class="controls-container">
            <button id="fillToolBtn" class="tool-btn active-tool" data-tool="fill">
                <span class="square-icon">■</span> Fill
            </button>
            <button id="xToolBtn" class="tool-btn" data-tool="x">
                <span class="x-icon">✖</span> Mark X
            </button>
            <button id="clearBtn" class="action-btn">Reset Grid</button>
        </div>
    </div>

    <script type="module" src="puzzles.js"></script>
    <script type="module" src="game.js"></script>
</body>
</html>
